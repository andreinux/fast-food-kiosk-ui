<!DOCTYPE html>
  <html lang="en">
    <head>
        <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">

          <title>burger Martini-order</title>

          <link rel="stylesheet" href="normalize.css">
          <link rel="stylesheet" href="style.css">

          <script src="main.js" defer></script>

    </head>
    <body> 
         <!--welcome section-->

         <section class="sections" id="welcome">
            <image id="logo" src="Orange Black Illustrated Burger Logo.png"></image>
            <div id="welcome-container">
                <h1>Welcome to <span id="burger">burger</span> <span id="martini">Martini</span> </h1>
            </div>
            <button id="order-btn">Start Order</button>
         </section>
  <!--categories section-->

         <section class="sections" id="categories" hidden>

          <div id="category-topbox">
          <image id="logo-left" src="Orange Black Illustrated Burger Logo.png">
            <h1 id="h-categories">What Would You Like?</h1>
          </div>

            <div class="category-container">
              <button class="category-btn" id="hamburger-btn">
                <img class="category-images" id="burger" src="Hamburger.jpg">
              </button>

              <button class="category-btn" id="hotdog-btn" >
                <img class="category-images" id="hotdog" src="Delicious hot dog in a sesame seed bun with mustard, cheese, and lettuce on a white background_.jpg">
              </button>

              <button class="category-btn" id="fries-btn">
               <img class="category-images" id="fries" src="fries.jpg">
              </button>

              <button class="category-btn" id="drinks-btn">
                <img class="category-images" id="iced-tea" src="icedtea.jpg">
              </button>
              
              
              </div>
              <div id="category-label">
                <h3>Burgers</h3>
                <h3>Hotdogs</h3>
                <h3>Fries</h3>
                <h3>Drinks</h3>
            </div>
         </section>
<!--burger items-->

         <section class="sections" id="burger-items" hidden>

          <div id="category-topbox">
           <image id="logo-left" src="Orange Black Illustrated Burger Logo.png">
            <h1 id="h-categories">Burgers</h1>
            <button class="backto-menubtn">Back</button>
           </div>
           
        <div  class="category-container" id="burger-itemsBox">
      
          <div class="item-btn-container">
          <button class="category-btn" id="cheeseBurger-itembtn">
            <img id="cheeseBurger-image" class="category-images" src="Client Challenge.jpg">
             <p class="name">Cheese Burger <span id="price">P30</span> </p>
          </button>
          <div class="item-quantity-counter">Quantity: <span id="cheeseBurger-quantity">0</span> </div>
          </div>
          
      <div class="item-btn-container">
          <button class="category-btn" id="martini-itembtn">
            <img id="martini-image" class="category-images" src="Hamburger.jpg">
            <p class="name">Special Martini Burger<span id="price">P50 </span> </p>
          </button>
           <div class="item-quantity-counter">Quantity: <span id="martini-quantity">0</span> </div>
          </div>
          </div>
          <button class="add-to-orderBtn">Add To Order</button>
         </section>
    

           <!--hotdogs section-->

         <section class="sections" id="hotdogs" hidden>
           <div id="category-topbox">
           <image id="logo-left" src="Orange Black Illustrated Burger Logo.png">
            <h1 id="h-categories">Hotdog Sandwiches</h1>
            <button id="hotdog-backbtn" class="backto-menubtn">Back</button>
           </div>

            <div  class="category-container" id="hotdogs-itemsBox">

         <div class="item-btn-container">
          <button class="category-btn" id="hotdog-itembtn">
            <img id="hotdog-image" class="category-images" src="hotdog.jpg">
             <p class="name">Cheesy Hotdog <span id="price">P39</span> </p>
          </button>
           <div class="item-quantity-counter">Quantity: <span id="hotdog-quantity">0</span> </div>
          </div>
        
          <div class="item-btn-container">
          <button class="category-btn" id="footlong">
            <img id="footlong-image" class="category-images" src="Sonic.jpg">
            <p class="name">Cheesy Footlong<span id="price">P49 </span> </p>
          </button>
           <div class="item-quantity-counter">Quantity: <span id="footlong-quantity">0</span> </div>
          </div>
        </div>
          <button class="add-to-orderBtn">Add To Order</button>
         </section>

         <!--fries section-->
         <section class="sections" id="friesSection" hidden>
           <div id="category-topbox">
           <image id="logo-left" src="Orange Black Illustrated Burger Logo.png">
            <h1 id="h-categories">Fries</h1>
            <button class="backto-menubtn">Back</button>
           </div>

           <div  class="category-container" id="fries-itemsBox">
        <div class="item-btn-container">
          <button class="category-btn" id="friesSmall-itembtn">
            <img id="friesSmall-image" class="category-images" src="Sfries.jpg">
             <p class="name">Small Fries  <span id="price">P30</span> </p>
          </button>
           <div class="item-quantity-counter">Quantity: <span id="Sfries-quantity">0</span> </div>
          </div>
          <div class="item-btn-container">
          <button class="category-btn" id="friesLarge-itembtn">
            <img id="friesLarge-image" class="category-images" src="Lfries.jpg">
            <p class="name">Large Fries <span id="price">P50 </span> </p>
          </button>
           <div class="item-quantity-counter">Quantity: <span id="Lfries-quantity">0</span> </div>
          </div>
        </div>
            <button class="add-to-orderBtn">Add To Order</button>
         </section>

         <!--drinks section-->

         <section class="sections" id="drinksSection" hidden>
            <div id="category-topbox">
           <image id="logo-left" src="Orange Black Illustrated Burger Logo.png">
            <h1 id="h-categories">Drinks</h1>
            <button class="backto-menubtn">Back</button>
           </div>

           <div  class="category-container" id="drinks-itemsBox">
       
        <div class="item-btn-container">
          <button class="category-btn" id="icedtea-itembtn">
            <img id="icedtea-image" class="category-images" src="tea.jpg">
             <p class="name">Iced Tea  <span id="price">P25</span> </p>
          </button>
           <div class="item-quantity-counter">Quantity: <span id="icedTea-quantity">0</span> </div>
          </div>
          
        <div class="item-btn-container">
          <button class="category-btn" id="mocha-itembtn">
            <img id="mocha-image" class="category-images" src="mocha.jpg">
            <p class="name">Iced Mocha Latte <span id="price">P79</span> </p>
          </button>
           <div class="item-quantity-counter">Quantity: <span id="mocha-quantity">0</span> </div>
          </div>
  
          <div class="item-btn-container">
           <button class="category-btn" id="taro-itembtn">
            <img id="taro-image" class="category-images" src="taro.jpg">
             <p class="name">Taro Milk Tea <span id="price">P79</span> </p>
          </button>
           <div class="item-quantity-counter">Quantity: <span id="taro-quantity">0</span> </div>
          </div>
      
        <div class="item-btn-container">
          <button class="category-btn" id="matcha-itembtn">
            <img id="matcha-image" class="category-images" src="matcha.jpg">
            <p class="name">Matcha <span id="price">P79</span> </p>
          </button>
           <div class="item-quantity-counter">Quantity: <span id="matcha-quantity">0</span> </div>
          </div>
        </div>

          <button class="add-to-orderBtn">Add To Order</button>
         </section>
       
    </body>
  </html>
